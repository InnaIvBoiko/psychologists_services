name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest

    # Disposable Postgres for the run — the e2e suite drives the real app (list,
    # registration, login, delete-account), so a live database is required. No
    # production secrets are involved: everything below is throwaway CI config.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psychologists_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Local Postgres isn't pooled, so DATABASE_URL and DIRECT_URL are identical.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/psychologists_test?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/psychologists_test?schema=public"
      # Auth.js needs a signing secret; a fixed dummy is fine for CI.
      AUTH_SECRET: "ci-e2e-secret-not-used-in-production"
      # Upstash (rate limiting) and Resend (email) are intentionally left unset —
      # both degrade gracefully to no-ops, so logins/registrations aren't throttled.

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed psychologists
        run: npm run db:seed

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build the app
        run: npm run build

      - name: Run e2e tests
        # Test the production server instead of `next dev` for speed and stability.
        run: npm run test:e2e
        env:
          PLAYWRIGHT_WEB_SERVER: npm run start

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
